<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #1a73e8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 .icon { font-size: 20px; }
    .info {
      font-size: 12px;
      color: #666;
      margin-bottom: 14px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1557b0; }
    button:active { background: #0d47a1; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: #0d904f; }
    .status.error { color: #d93025; }
  </style>
</head>
<body>
  <h1><span class="icon">📝</span>Save as Markdown</h1>
  <div class="info" id="titlePreview">加载中...</div>
  <button id="saveBtn">保存为 Markdown</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
