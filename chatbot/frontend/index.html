<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBot - AI 助手</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root {
  --sidebar-w: 260px;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --bg: #ffffff;
  --bg-secondary: #f8f9fb;
  --sidebar-bg: #f0f1f5;
  --text: #1f2937;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --user-bubble: #e8e8ff;
  --user-text: #3730a3;
  --thinking-bg: #fffbeb;
  --thinking-border: #fcd34d;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --radius: 8px;
  --radius-lg: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────── */

.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
}

.btn-new {
  width: 100%;
  padding: 10px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .15s;
}
.btn-new:hover { background: var(--accent-hover); }

.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.conv-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  transition: background .12s;
  margin-bottom: 2px;
}
.conv-item:hover { background: rgba(0,0,0,.06); }
.conv-item.active { background: rgba(0,0,0,.08); }

.conv-item-title {
  flex: 1;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.conv-item-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity .12s;
}
.conv-item:hover .conv-item-actions { opacity: 1; }

.btn-icon {
  width: 28px; height: 28px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 14px;
  transition: all .12s;
}
.btn-icon:hover { background: rgba(0,0,0,.1); color: var(--danger); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
}

/* ── Chat Area ───────────────────────────── */

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.chat-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.model-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  background: #e8e8ff;
  color: #3730a3;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--bg-secondary);
  scroll-behavior: smooth;
}

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--text-secondary);
}
.welcome-icon { font-size: 64px; margin-bottom: 16px; opacity: .5; }
.welcome h2 { font-size: 22px; margin-bottom: 8px; color: var(--text); }
.welcome p { font-size: 14px; max-width: 420px; line-height: 1.6; }

/* ── Messages ────────────────────────────── */

.msg {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  animation: fadeIn .2s ease;
}
.msg.user {
  flex-direction: row-reverse;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.msg-avatar.user { background: var(--accent); color: #fff; }
.msg-avatar.ai { background: #10b981; color: #fff; }

.msg-content {
  flex: 1;
  min-width: 0;
  font-size: 14px;
  line-height: 1.7;
}

.msg.user .msg-content {
  flex: 0 1 auto;
  background: var(--user-bubble);
  color: var(--user-text);
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  max-width: 70%;
}

.msg.ai .msg-content { color: var(--text); }

.msg.ai .msg-content p { margin-bottom: 8px; }
.msg.ai .msg-content p:last-child { margin-bottom: 0; }
.msg.ai .msg-content h1, .msg.ai .msg-content h2, .msg.ai .msg-content h3 { margin: 16px 0 8px; }
.msg.ai .msg-content h1 { font-size: 1.4em; }
.msg.ai .msg-content h2 { font-size: 1.2em; }
.msg.ai .msg-content h3 { font-size: 1.05em; }
.msg.ai .msg-content ul, .msg.ai .msg-content ol { padding-left: 20px; margin-bottom: 8px; }
.msg.ai .msg-content li { margin-bottom: 4px; }
.msg.ai .msg-content pre { margin: 12px 0; border-radius: var(--radius); overflow-x: auto; }
.msg.ai .msg-content code { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 13px; }
.msg.ai .msg-content :not(pre) > code {
  background: rgba(0,0,0,.06);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: .9em;
}
.msg.ai .msg-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}
.msg.ai .msg-content table {
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
}
.msg.ai .msg-content th, .msg.ai .msg-content td {
  border: 1px solid var(--border);
  padding: 6px 12px;
  text-align: left;
}
.msg.ai .msg-content th { background: var(--sidebar-bg); font-weight: 600; }
.msg.ai .msg-content a { color: var(--accent); text-decoration: none; }
.msg.ai .msg-content a:hover { text-decoration: underline; }

.code-block-wrapper {
  position: relative;
  margin: 12px 0;
}
.code-block-wrapper pre { margin: 0; }
.btn-copy {
  position: absolute;
  top: 8px; right: 8px;
  padding: 4px 10px;
  background: rgba(255,255,255,.1);
  color: #ccc;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.btn-copy:hover { background: rgba(255,255,255,.2); color: #fff; }
.btn-copy.copied { background: var(--accent); border-color: var(--accent); }

/* ── Thinking Block ──────────────────────── */

.thinking-block {
  margin-bottom: 12px;
  border: 1px solid var(--thinking-border);
  border-radius: var(--radius);
  background: var(--thinking-bg);
  overflow: hidden;
  animation: fadeIn .2s ease;
}

.thinking-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  color: #92400e;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.thinking-header:hover { background: rgba(252,211,77,.2); }

.thinking-header .arrow {
  font-size: 10px;
  transition: transform .2s;
}
.thinking-header .arrow.collapsed { transform: rotate(-90deg); }

.thinking-content {
  padding: 0 14px 12px;
  font-size: 13px;
  color: #78716c;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}

.thinking-content.collapsed { display: none; }

.thinking-streaming .thinking-content {
  border-left: 3px solid var(--thinking-border);
  margin-left: 11px;
  padding-left: 12px;
}

/* ── Tool Block ──────────────────────────── */

.tool-block {
  margin-bottom: 10px;
  border: 1px solid #bfdbfe;
  border-radius: var(--radius);
  background: #eff6ff;
  overflow: hidden;
  animation: fadeIn .2s ease;
  font-size: 13px;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  font-weight: 500;
  color: #1e40af;
  background: rgba(191,219,254,.3);
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.tool-header:hover { background: rgba(191,219,254,.5); }
.tool-header .arrow { font-size: 10px; margin-left: auto; transition: transform .2s; }
.tool-header .arrow.collapsed { transform: rotate(-90deg); }

.tool-body {
  padding: 8px 12px;
  color: #374151;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.5;
}
.tool-body.collapsed { display: none; }

.tool-start .tool-body { color: #6b7280; }

/* ── Search Results ──────────────────────── */

.search-results { padding: 0; }

.search-result {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(191,219,254,.4);
  line-height: 1.5;
}
.search-result:last-child { border-bottom: none; }

.search-result-title {
  font-weight: 600;
  color: #1e40af;
  font-size: 13px;
  margin-bottom: 2px;
}
.search-result-title a {
  color: inherit;
  text-decoration: none;
}
.search-result-title a:hover { text-decoration: underline; }

.search-result-url {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-result-snippet {
  font-size: 12px;
  color: #374151;
  line-height: 1.6;
}

.search-results.collapsed { display: none; }

/* ── Tool Loading Spinner ────────────────── */

.tool-loading {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  color: #6b7280;
  font-size: 13px;
}

.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid #bfdbfe;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tool-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  background: #e0e7ff;
  color: #3730a3;
}

/* ── Skill Select ────────────────────────── */

.skill-select {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  cursor: pointer;
}
.skill-select:focus { border-color: var(--accent); }

/* ── Input Area ──────────────────────────── */

.input-area {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-row {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.model-select {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  cursor: pointer;
}
.model-select:focus { border-color: var(--accent); }
.model-select option:disabled { color: var(--text-secondary); }

.btn-thinking {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: var(--bg);
  color: var(--text-secondary);
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-thinking:hover { border-color: var(--thinking-border); color: #92400e; }
.btn-thinking.active {
  background: var(--thinking-bg);
  border-color: var(--thinking-border);
  color: #92400e;
}

.btn-websearch {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: var(--bg);
  color: var(--text-secondary);
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-websearch:hover { border-color: #93c5fd; color: #1e40af; }
.btn-websearch.active {
  background: #eff6ff;
  border-color: #93c5fd;
  color: #1e40af;
}

.input-box {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-box textarea {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 200px;
  line-height: 1.5;
  transition: border-color .15s;
}
.input-box textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }

.btn-send {
  width: 44px; height: 44px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent-hover); }
.btn-send:disabled { background: #d1d5db; cursor: not-allowed; }

.btn-stop {
  width: 44px; height: 44px;
  border: none;
  background: var(--danger);
  color: #fff;
  border-radius: var(--radius);
  font-size: 18px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-stop:hover { background: var(--danger-hover); }
.btn-stop.visible { display: flex; }

/* ── Loading ─────────────────────────────── */

.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--text-secondary);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typing { 0%,60%,100% { opacity: .2; } 30% { opacity: 1; } }

/* ── Toast ───────────────────────────────── */

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 1000;
  animation: toastIn .3s ease;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ── Empty state ─────────────────────────── */

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  font-size: 14px;
}
.empty-state span { font-size: 48px; margin-bottom: 12px; opacity: .4; }

/* ── Scrollbar ───────────────────────────── */

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ── Responsive ──────────────────────────── */

@media (max-width: 768px) {
  .sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; display: none; }
  .sidebar.open { display: flex; }
  .chat-header { padding: 12px 16px; }
  .messages { padding: 16px; }
  .input-area { padding: 12px 16px; }
  .msg.user .msg-content { max-width: 85%; }
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>💬 ChatBot</h1>
    <button class="btn-new" onclick="createChat()">+ 新对话</button>
  </div>
  <div class="conv-list" id="convList"></div>
  <div class="sidebar-footer">API: <span id="apiStatus">mock</span> | MCP: <span id="mcpStatus">--</span></div>
</aside>

<main class="chat-area">
  <div class="chat-header" id="chatHeader">
    <span id="chatTitle">ChatBot</span>
    <span class="model-badge" id="modelBadge" style="display:none"></span>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>欢迎使用 ChatBot</h2>
      <p>支持 DeepSeek V4 Pro / Flash 和千问系列模型。开启「深度思考」模式可查看模型推理过程。</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <div class="input-controls">
        <select class="model-select" id="modelSelect" onchange="onModelChange()"></select>
        <select class="skill-select" id="skillSelect" onchange="onSkillChange()"></select>
        <button class="btn-websearch active" id="btnWebSearch" onclick="toggleWebSearch()">🌐 联网搜索</button>
        <button class="btn-thinking" id="btnThinking" onclick="toggleThinking()">🧠 深度思考</button>
      </div>
      <div class="input-box">
        <textarea id="inputBox" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
        <button class="btn-send" id="btnSend" onclick="send()" disabled>➤</button>
        <button class="btn-stop" id="btnStop" onclick="stopGeneration()">⏹</button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/14.1.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
// ── State ──
let conversations = [];
let currentId = null;
let isStreaming = false;
let models = [];
let currentModel = '';
let skills = [];
let currentSkill = 'general';
let thinkingEnabled = false;
let webSearchEnabled = true;
let abortController = null;

// ── Marked config ──
const renderer = new marked.Renderer();
renderer.code = function({ text, lang }) {
  const escaped = escapeHtml(text);
  const langClass = lang ? ` class="language-${lang}"` : '';
  return `<div class="code-block-wrapper"><pre><code${langClass}>${escaped}</code></pre><button class="btn-copy" onclick="copyCode(this)">复制</button></div>`;
};
marked.use({ breaks: true, gfm: true, renderer });

// ── Helpers ──
function fixMarkdown(text) {
  return text
    .replace(/^(#{1,6})([^\s#])/gm, '$1 $2')
    .replace(/^(\s*)([-*+])([^\s])/gm, '$1$2 $3')
    .replace(/^(>)([^\s>])/gm, '$1 $2');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function stripDSML(text) {
  return text
    .replace(/<\uFF5Ctool_calls>.*?<\/\uFF5Ctool_calls>/gs, '')
    .replace(/<\/?\uFF5C[^>]*>/g, '');
}

function el(id) { return document.getElementById(id); }

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function hideWelcome() {
  const w = el('welcome');
  if (w) w.style.display = 'none';
}

function scrollBottom() {
  const m = el('messages');
  m.scrollTop = m.scrollHeight;
}

// ── Thinking toggle ──
function toggleThinking() {
  thinkingEnabled = !thinkingEnabled;
  const btn = el('btnThinking');
  if (thinkingEnabled) {
    btn.classList.add('active');
    btn.innerHTML = '🧠 深度思考 ✓';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '🧠 深度思考';
  }
}

// ── Web search toggle ──
function toggleWebSearch() {
  webSearchEnabled = !webSearchEnabled;
  const btn = el('btnWebSearch');
  if (webSearchEnabled) {
    btn.classList.add('active');
    btn.innerHTML = '🌐 联网搜索 ✓';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '🌐 联网搜索';
  }
}

// ── Stop generation ──
function stopGeneration() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
}

// ── Thinking block ──
function formatThinking(text) {
  if (!text) return text;
  if (!text.includes('\n')) {
    return text.replace(/([。！？])\s*/g, '$1\n\n');
  }
  return text;
}

function createThinkingBlock(parentEl) {
  const block = document.createElement('div');
  block.className = 'thinking-block thinking-streaming';
  block.innerHTML = `
    <div class="thinking-header" onclick="event.stopPropagation();this.parentElement.querySelector('.thinking-content').classList.toggle('collapsed');this.querySelector('.arrow').classList.toggle('collapsed')">
      <span>🧠 深度思考中…</span>
      <span class="arrow">▼</span>
    </div>
    <div class="thinking-content"></div>
  `;
  parentEl.appendChild(block);
  return block;
}

function thinkingBlockHTML(content) {
  if (!content) return '';
  return `
    <div class="thinking-block">
      <div class="thinking-header" onclick="var c=this.nextElementSibling;var a=this.querySelector('.arrow');c.classList.toggle('collapsed');a.classList.toggle('collapsed')">
        <span>🧠 思考过程</span>
        <span class="arrow collapsed">▼</span>
      </div>
      <div class="thinking-content collapsed">${marked.parse(fixMarkdown(formatThinking(content)))}</div>
    </div>`;
}

// ── Models ──
async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    models = data.models;
    const def = models.find(m => m.id === data.default && m.available);
    const first = models.find(m => m.available);
    currentModel = def ? def.id : (first ? first.id : data.default);
    renderModelSelect();
    updateModelBadge();
    updateApiStatus();
  } catch(e) {
    console.error('Load models failed:', e);
  }
}

function renderModelSelect() {
  const sel = el('modelSelect');
  if (models.length === 0) {
    sel.innerHTML = '<option>mock</option>';
    return;
  }
  let html = '';
  let currentProvider = '';
  for (const m of models) {
    if (m.provider_name !== currentProvider) {
      if (currentProvider) html += '</optgroup>';
      currentProvider = m.provider_name;
      html += `<optgroup label="${escapeHtml(m.provider_name)}">`;
    }
    const dis = m.available ? '' : ' disabled';
    const label = m.available ? m.name : `${m.name} (未配置 Key)`;
    const sel = m.id === currentModel ? ' selected' : '';
    html += `<option value="${m.id}"${dis}${sel}>${escapeHtml(label)}</option>`;
  }
  html += '</optgroup>';
  sel.innerHTML = html;
}

function onModelChange() {
  currentModel = el('modelSelect').value;
  updateModelBadge();
}

function updateModelBadge() {
  const badge = el('modelBadge');
  const m = models.find(x => x.id === currentModel);
  if (m && m.available) {
    badge.textContent = m.name;
    badge.style.display = 'inline';
    badge.style.background = '#e8e8ff';
    badge.style.color = '#3730a3';
  } else if (m && !m.available) {
    badge.textContent = '模拟模式';
    badge.style.display = 'inline';
    badge.style.background = '#fef3c7';
    badge.style.color = '#92400e';
  } else {
    badge.style.display = 'none';
  }
}

function updateApiStatus() {
  const available = models.filter(m => m.available);
  const st = el('apiStatus');
  if (available.length > 0) {
    st.textContent = available.map(m => m.name).join(', ');
    st.style.color = '#10b981';
  } else {
    st.textContent = 'mock';
    st.style.color = '#6b7280';
  }
}

// ── Skills ──
async function loadSkills() {
  try {
    const res = await fetch('/api/skills');
    const data = await res.json();
    skills = data.skills;
    currentSkill = data.default || 'general';
    renderSkillSelect();
  } catch(e) {
    console.error('Load skills failed:', e);
  }
}

function renderSkillSelect() {
  const sel = el('skillSelect');
  sel.innerHTML = skills.map(s => {
    const selected = s.id === currentSkill ? ' selected' : '';
    return `<option value="${s.id}"${selected}>${s.icon} ${escapeHtml(s.name)}</option>`;
  }).join('');
}

function onSkillChange() {
  currentSkill = el('skillSelect').value;
}

// ── MCP Status ──
async function loadMCPStatus() {
  try {
    const res = await fetch('/api/mcp/status');
    const data = await res.json();
    const st = el('mcpStatus');
    if (data.tool_count > 0) {
      st.textContent = `${data.tool_count} tools`;
      st.style.color = '#10b981';
    } else {
      st.textContent = '--';
      st.style.color = '#6b7280';
    }
  } catch(e) {
    el('mcpStatus').textContent = '--';
  }
}

// ── API ──
async function api(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res;
}

// ── Conversations ──
async function loadConversations() {
  try {
    const res = await api('/api/conversations');
    conversations = await res.json();
    renderConvList();
    if (!currentId && conversations.length > 0) {
      selectConversation(conversations[0].id);
    }
  } catch(e) {
    console.error('Load conversations failed:', e);
  }
}

function renderConvList() {
  const list = el('convList');
  if (conversations.length === 0) {
    list.innerHTML = '<div class="empty-state"><span>💬</span>暂无对话</div>';
    return;
  }
  list.innerHTML = conversations.map(c => `
    <div class="conv-item${c.id === currentId ? ' active' : ''}" onclick="selectConversation('${c.id}')">
      <span class="conv-item-title">${escapeHtml(c.title)}</span>
      <span class="conv-item-actions">
        <button class="btn-icon" title="重命名" onclick="event.stopPropagation();renamePrompt('${c.id}')">✎</button>
        <button class="btn-icon" title="删除" onclick="event.stopPropagation();deleteChat('${c.id}')">✕</button>
      </span>
    </div>
  `).join('');
}

async function selectConversation(id) {
  if (isStreaming) return;
  currentId = id;
  renderConvList();
  try {
    const res = await api(`/api/conversations/${id}`);
    const conv = await res.json();
    renderMessages(conv.messages);
    el('chatTitle').textContent = conv.title;
    hideWelcome();
    el('btnSend').disabled = false;
    el('inputBox').focus();
  } catch(e) {
    toast('加载对话失败');
  }
}

async function createChat() {
  if (isStreaming) return;
  try {
    const res = await api('/api/conversations', { method: 'POST' });
    const conv = await res.json();
    conversations.unshift(conv);
    selectConversation(conv.id);
    el('inputBox').focus();
  } catch(e) {
    toast('创建对话失败');
  }
}

async function deleteChat(id) {
  if (!confirm('确定删除此对话？')) return;
  try {
    await api(`/api/conversations/${id}`, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== id);
    if (currentId === id) {
      currentId = conversations.length > 0 ? conversations[0].id : null;
      if (currentId) {
        await selectConversation(currentId);
        renderConvList();
      } else {
        el('messages').innerHTML = `<div class="welcome" id="welcome">
          <div class="welcome-icon">🤖</div>
          <h2>欢迎使用 ChatBot</h2>
          <p>支持 DeepSeek V4 Pro / Flash 和千问系列模型。开启「深度思考」模式可查看模型推理过程。</p>
        </div>`;
        el('chatTitle').textContent = 'ChatBot';
        el('btnSend').disabled = true;
      }
    }
    renderConvList();
  } catch(e) {
    toast('删除失败');
  }
}

async function renamePrompt(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  const title = prompt('重命名对话：', conv.title);
  if (!title || title.trim() === '') return;
  try {
    await api(`/api/conversations/${id}`, {
      method: 'PUT',
      body: JSON.stringify({ title: title.trim() }),
    });
    conv.title = title.trim();
    renderConvList();
    if (currentId === id) el('chatTitle').textContent = title.trim();
  } catch(e) {
    toast('重命名失败');
  }
}

// ── Messages rendering ──
function renderMessages(msgs) {
  const container = el('messages');
  hideWelcome();
  container.innerHTML = msgs.map(m => msgHTML(m.role, m.content, m.thinking, m.tools)).join('');
  container.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  scrollBottom();
}

function msgHTML(role, content, thinking, tools) {
  const avatar = role === 'user' ? '👤' : '🤖';
  const cls = role === 'user' ? 'user' : 'ai';
  let body = '';
  if (role === 'ai') {
    if (tools && tools.length > 0) {
      for (const t of tools) {
        body += toolBlockHTML(t.name, t.result || t.args || '');
      }
    }
    if (thinking) body += thinkingBlockHTML(thinking);
    body += marked.parse(fixMarkdown(content));
  } else {
    body = escapeHtml(content);
  }
  return `
    <div class="msg ${cls}">
      <div class="msg-avatar ${cls}">${avatar}</div>
      <div class="msg-content">${body}</div>
    </div>`;
}

function toolBlockHTML(name, detail) {
  if (name === 'web_search' && detail) {
    try {
      const data = typeof detail === 'string' ? JSON.parse(detail) : detail;
      const results = data.results || [];
      if (results.length > 0) {
        const cards = results.map(r => `
          <div class="search-result">
            <div class="search-result-title"><a href="${escapeHtml(r.url)}" target="_blank">${escapeHtml(r.title)}</a></div>
            <div class="search-result-url">${escapeHtml(r.url)}</div>
            <div class="search-result-snippet">${escapeHtml(r.snippet)}</div>
          </div>
        `).join('');
        return `
          <div class="tool-block">
            <div class="tool-header" onclick="var c=this.nextElementSibling;var a=this.querySelector('.arrow');c.classList.toggle('collapsed');a.classList.toggle('collapsed')">
              <span>🔍 搜索结果 (${results.length} 条)</span>
              <span class="arrow collapsed">▼</span>
            </div>
            <div class="search-results collapsed">${cards}</div>
          </div>`;
      }
    } catch(e) {}
  }
  let body = '';
  try { body = (typeof detail === 'string') ? JSON.stringify(JSON.parse(detail), null, 2) : JSON.stringify(detail, null, 2); }
  catch(e) { body = String(detail); }
  return `
    <div class="tool-block">
      <div class="tool-header" onclick="var c=this.nextElementSibling;var a=this.querySelector('.arrow');c.classList.toggle('collapsed');a.classList.toggle('collapsed')">
        <span>🔧 ${escapeHtml(name)}</span>
        <span class="arrow collapsed">▼</span>
      </div>
      <div class="tool-body collapsed">${escapeHtml(body)}</div>
    </div>`;
}

// ── Send message ──
async function send() {
  if (isStreaming || !currentId) return;
  const input = el('inputBox');
  const content = input.value.trim();
  if (!content) return;

  input.value = '';
  input.style.height = 'auto';
  el('btnSend').style.display = 'none';
  el('btnStop').classList.add('visible');
  isStreaming = true;
  abortController = new AbortController();
  const thinking = thinkingEnabled;

  const container = el('messages');
  hideWelcome();

  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.innerHTML = `<div class="msg-avatar user">👤</div><div class="msg-content">${escapeHtml(content)}</div>`;
  container.appendChild(userDiv);
  scrollBottom();

  const aiMsgDiv = document.createElement('div');
  aiMsgDiv.className = 'msg ai';
  aiMsgDiv.innerHTML = `<div class="msg-avatar ai">🤖</div><div class="msg-content"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  container.appendChild(aiMsgDiv);
  const aiContent = aiMsgDiv.querySelector('.msg-content');

  let thinkingBlock = null;
  let answerEl = null;
  let thinkingBuf = '';
  let answerBuf = '';
  let firstEvent = true;

  try {
    const res = await fetch(`/api/conversations/${currentId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, model: currentModel, thinking, skill: currentSkill, web_search: webSearchEnabled }),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Send failed');
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          // Clear loading dots on first real event
          if (firstEvent && data.type !== 'done') {
            firstEvent = false;
            aiContent.innerHTML = '';
          }
          switch (data.type) {
            case 'thinking_start':
              thinkingBlock = createThinkingBlock(aiContent);
              break;
            case 'thinking':
              thinkingBuf += data.content;
              if (thinkingBlock) {
                const tc = thinkingBlock.querySelector('.thinking-content');
                tc.innerHTML = marked.parse(fixMarkdown(formatThinking(thinkingBuf)));
                scrollBottom();
              }
              break;
            case 'thinking_done':
              if (thinkingBlock) {
                thinkingBlock.querySelector('.thinking-header span').textContent = '🧠 思考完成';
                thinkingBlock.classList.remove('thinking-streaming');
              }
              answerEl = document.createElement('div');
              answerEl.className = 'answer-body';
              answerEl.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
              aiContent.appendChild(answerEl);
              scrollBottom();
              break;
            case 'tool_start':
              try {
                const ts = JSON.parse(data.content);
                if (ts.name === 'web_search') {
                  const args = JSON.parse(ts.args || '{}');
                  const tb = document.createElement('div');
                  tb.className = 'tool-block tool-start';
                  tb.innerHTML = `
                    <div class="tool-header">
                      <span>🔍 搜索中: ${escapeHtml(args.query || '')}</span>
                      <span class="spinner" style="margin-left:auto"></span>
                    </div>
                  `;
                  tb._toolName = ts.name;
                  aiContent.appendChild(tb);
                } else {
                  const tb = document.createElement('div');
                  tb.className = 'tool-block tool-start';
                  tb.innerHTML = `
                    <div class="tool-header">
                      <span>🔧 调用工具: ${escapeHtml(ts.name)}</span>
                      <span class="spinner" style="margin-left:auto"></span>
                    </div>
                    <div class="tool-body">${escapeHtml(ts.args || '')}</div>
                  `;
                  tb._toolName = ts.name;
                  aiContent.appendChild(tb);
                }
                scrollBottom();
              } catch(e) {}
              break;
            case 'tool_result':
              try {
                const tr = JSON.parse(data.content);
                const existing = aiContent.querySelectorAll('.tool-start');
                if (existing.length > 0) {
                  const last = existing[existing.length - 1];
                  last.classList.remove('tool-start');
                  if (tr.name === 'web_search') {
                    const result = JSON.parse(tr.result);
                    const results = result.results || [];
                    let cards = '';
                    if (results.length > 0) {
                      cards = results.map(r => `
                        <div class="search-result">
                          <div class="search-result-title"><a href="${escapeHtml(r.url)}" target="_blank">${escapeHtml(r.title)}</a></div>
                          <div class="search-result-url">${escapeHtml(r.url)}</div>
                          <div class="search-result-snippet">${escapeHtml(r.snippet)}</div>
                        </div>
                      `).join('');
                    } else {
                      cards = '<div style="padding:8px 12px;color:#6b7280">未找到相关结果</div>';
                    }
                    last.innerHTML = `
                      <div class="tool-header" onclick="var c=this.nextElementSibling;var a=this.querySelector('.arrow');c.classList.toggle('collapsed');a.classList.toggle('collapsed')">
                        <span>🔍 搜索结果 (${results.length} 条)</span>
                        <span class="arrow collapsed">▼</span>
                      </div>
                      <div class="search-results collapsed">${cards}</div>
                    `;
                  } else {
                    const hdr = last.querySelector('.tool-header span');
                    if (hdr) hdr.textContent = '🔧 ' + escapeHtml(tr.name);
                    const body = last.querySelector('.tool-body');
                    if (body) {
                      try { body.textContent = JSON.stringify(JSON.parse(tr.result), null, 2); }
                      catch(e) { body.textContent = tr.result; }
                    }
                  }
                }
                scrollBottom();
              } catch(e) {}
              break;
            case 'tool_done':
              break;
            case 'token':
              answerBuf += data.content;
              if (!answerEl) {
                answerEl = document.createElement('div');
                answerEl.className = 'answer-body';
                aiContent.appendChild(answerEl);
              }
              answerEl.innerHTML = marked.parse(fixMarkdown(answerBuf));
              answerEl.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
              scrollBottom();
              break;
            case 'done':
              scrollBottom();
              break;
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      answerBuf += '\n\n> ⏹ 已中断';
      if (answerEl) {
        answerEl.innerHTML = marked.parse(fixMarkdown(answerBuf));
      } else {
        let html = '';
        if (thinkingBlock) html += thinkingBlock.outerHTML;
        html += marked.parse(fixMarkdown(answerBuf));
        aiContent.innerHTML = html;
      }
    } else {
      let html = '';
      if (thinkingBlock) html += thinkingBlock.outerHTML;
      html += marked.parse(fixMarkdown(answerBuf + `\n\n> ⚠️ 错误：${escapeHtml(e.message)}`));
      aiContent.innerHTML = html;
    }
  }

  isStreaming = false;
  el('btnStop').classList.remove('visible');
  el('btnSend').style.display = '';
  el('btnSend').disabled = false;
  abortController = null;
  el('inputBox').focus();

  const resp = await api('/api/conversations');
  conversations = await resp.json();
  renderConvList();
  if (currentId) {
    const conv = conversations.find(c => c.id === currentId);
    if (conv) el('chatTitle').textContent = conv.title;
  }
}

// ── Copy code ──
function copyCode(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => toast('复制失败'));
}

// ── Keyboard ──
el('inputBox').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

el('inputBox').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

// ── Init ──
loadModels();
loadSkills();
loadMCPStatus();
loadConversations();
</script>
</body>
</html>
